services:

  backend:
    image: teambalance/backend
    build:
      context: ./app
      dockerfile: Dockerfile.backend
    environment:
      DB_HOST: postgresql
      DB_PORT: 5432
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      # Healthchecks run inside the container — use localhost, not the service name.
      # /internal/actuator/health requires auth (Spring Security requires fullyAuthenticated).
      # Generous retries + short interval to handle Spring Boot cold-start on CI runners.
      test: [ "CMD", "curl", "-f", "-u", "admin:admin", "http://localhost:8080/internal/actuator/health" ]
      interval: 5s
      timeout: 3s
      start_period: 30s
      start_interval: 5s
      retries: 20



  frontend:
    image: teambalance/frontend-e2e
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      VITE_SERVER_BACKEND: backend
    healthcheck:
      # vite preview serves pre-built static assets — no compilation on first request,
      # so a fast HEAD check is sufficient.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      start_interval: 2s
      retries: 10

  postgresql:
    image: postgres:16.13-alpine
    ports:
      - "54321:5432"
    environment:
      POSTGRES_PASSWORD: postgres
    command: postgres -c max_connections=20
    volumes:
      - ./docker/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "pg_isready", "-d", "teambalance" ]
      interval: 30s
      start_period: 10s
      start_interval: 1s
      timeout: 5s
      retries: 3

  e2e:
    image: teambalance/e2e
    build:
      context: ./e2e
      dockerfile: Dockerfile
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      VITE_SERVER_BACKEND: backend
      HOST: http://frontend:3000
      PASSWORD: teambalance
      CI: ${CI:-}
    volumes:
      - ./e2e:/usr/src/app
      - /usr/src/app/node_modules
